name: Release Build

on:
  push:
    tags:
      - "v*" # 触发标签格式为 v1.0.0 这样的版本号

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          make all
          # 创建发布包
          VERSION=${GITHUB_REF#refs/tags/}
          tar czf hook_package_${VERSION}.tar.gz build/

      - name: Generate Release Notes
        run: |
          echo "## Hook Library ${GITHUB_REF#refs/tags/}" > release_notes.md
          echo "" >> release_notes.md
          echo "包含以下文件：" >> release_notes.md
          echo "- hook_execve.so.x86_64 (适用于 x86_64 架构，GLIBC >= 2.17)" >> release_notes.md
          echo "- hook_execve.so.aarch64 (适用于 ARM64 架构，GLIBC >= 2.17)" >> release_notes.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            hook_package_*.tar.gz
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
