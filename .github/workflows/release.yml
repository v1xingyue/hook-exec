name: Release Build

on:
  push:
    tags:
      - "v*" # 触发标签格式为 v1.0.0 这样的版本号
  workflow_dispatch: # 添加手动触发
    inputs:
      version:
        description: "版本号 (例如: v1.0.0)"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "是否为预发布版本"
        type: boolean
        required: false
        default: false

# 添加权限配置
permissions:
  contents: write # 这个权限足够处理 releases 了
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          make all
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          # 复制并重命名 so 文件
          cp build/hook_execve.so.x86_64 hook_execve.${VERSION}.x86_64.so
          cp build/hook_execve.so.aarch64 hook_execve.${VERSION}.aarch64.so
          # 创建完整包
          tar czf hook_package_${VERSION}.tar.gz build/

      - name: Generate Release Notes
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "## Hook Library ${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 单独的 SO 文件：" >> release_notes.md
          echo "- hook_execve.${VERSION}.x86_64.so (x86_64 架构，GLIBC >= 2.17)" >> release_notes.md
          echo "- hook_execve.${VERSION}.aarch64.so (ARM64 架构，GLIBC >= 2.17)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 完整包：" >> release_notes.md
          echo "- hook_package_${VERSION}.tar.gz (包含所有文件)" >> release_notes.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            hook_package_*.tar.gz
            hook_execve.*.x86_64.so
            hook_execve.*.aarch64.so
          body_path: release_notes.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
